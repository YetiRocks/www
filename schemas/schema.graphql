type BetaSignup @table(database: "www") @export(public: [create]) {
    id: ID! @primaryKey
    name: String!
    email: String!
    company: String
    title: String
    idea: String
    created_at: String! @createdTime
}

type BlogPost @table(database: "www") @export(public: [read]) {
    id: ID! @primaryKey
    title: String!
    description: String!
    date: String!
    author: String!
    category: String!
    readingTime: String!
    content: String!
    heroImage: String
    synced_at: String! @updatedTime
}
